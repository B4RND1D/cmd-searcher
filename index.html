<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CMD Search</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #0a0c0f;
    --surface: #0f1318;
    --border:  #1e2530;
    --accent:  #00e5a0;
    --accent2: #f0a500;
    --dim:     #3a4555;
    --muted:   #6b7f96;
    --text:    #c8d8e8;
    --bright:  #eaf4ff;
    --red:     #ff4f6a;
    --blue:    #3b9eff;
    --purple:  #a78bfa;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Scanlines */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px);
    pointer-events: none; z-index: 9999;
  }

  /* Ambient glow top */
  body::after {
    content: '';
    position: fixed; top: -30vh; left: 50%; transform: translateX(-50%);
    width: 80vw; height: 60vh;
    background: radial-gradient(ellipse, rgba(0,229,160,0.05) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }

  /* ── Header ─────────────────────────────────────────── */
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10,12,15,0.94);
    backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--border);
  }

  .header-inner {
    max-width: 1140px; margin: 0 auto;
    display: flex; align-items: center; gap: 1.2rem;
    padding: 0.85rem clamp(1rem, 4vw, 2.5rem);
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 1.35rem; font-weight: 800;
    color: var(--bright); letter-spacing: -0.02em;
    flex-shrink: 0; user-select: none;
  }
  .logo span { color: var(--accent); }

  .search-wrap {
    flex: 1; position: relative; display: flex; align-items: center;
  }
  .search-prefix {
    position: absolute; left: 0.9rem;
    color: var(--accent); font-size: 0.9rem;
    pointer-events: none; user-select: none;
  }
  #search {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--bright);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.88rem;
    padding: 0.55rem 1rem 0.55rem 2.2rem;
    outline: none; caret-color: var(--accent);
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  #search:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(0,229,160,0.1), 0 0 18px rgba(0,229,160,0.05);
  }
  #search::placeholder { color: var(--dim); }

  #count { flex-shrink: 0; font-size: 0.72rem; color: var(--muted); white-space: nowrap; }
  #count strong { color: var(--accent); }

  /* ── Group Tab Bar ───────────────────────────────────── */
  .group-bar {
    max-width: 1140px; margin: 0 auto;
    padding: 0 clamp(1rem, 4vw, 2.5rem);
    display: flex; gap: 0; align-items: stretch;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .group-bar::-webkit-scrollbar { display: none; }

  .group-tab {
    background: none;
    border: none; border-bottom: 2px solid transparent;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem; font-weight: 500;
    padding: 0.65rem 1.1rem;
    cursor: pointer; white-space: nowrap;
    transition: color 0.15s, border-color 0.15s;
    position: relative; top: 1px;   /* sits on the header border */
  }
  .group-tab:hover { color: var(--text); }
  .group-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* ── Sub-filter (cat) bar ────────────────────────────── */
  .cat-bar {
    max-width: 1140px; margin: 0 auto;
    padding: 0.8rem clamp(1rem, 4vw, 2.5rem) 0;
    display: flex; gap: 0.4rem; flex-wrap: wrap;
    min-height: 2.6rem;
  }

  .cat-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    padding: 0.25rem 0.65rem;
    cursor: pointer;
    transition: all 0.15s; user-select: none;
  }
  .cat-btn:hover { border-color: var(--dim); color: var(--text); }
  .cat-btn.active { background: rgba(0,229,160,0.1); border-color: var(--accent); color: var(--accent); }

  /* ── Page ────────────────────────────────────────────── */
  .page {
    max-width: 1140px; margin: 0 auto;
    padding: 1rem clamp(1rem, 4vw, 2.5rem) 5rem;
    position: relative; z-index: 1;
  }

  /* ── Empty / idle state ──────────────────────────────── */
  #idle {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 6rem 0 4rem;
    gap: 1rem;
    color: var(--dim);
    font-size: 0.82rem;
    text-align: center;
    animation: fadeIn 0.4s ease;
  }
  #idle .big-prompt {
    font-family: 'Syne', sans-serif;
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    font-weight: 800;
    color: var(--bright);
    line-height: 1.2;
  }
  #idle .big-prompt span { color: var(--accent); }
  #idle .hint { color: var(--muted); font-size: 0.78rem; line-height: 1.8; }
  #idle .hint kbd {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 3px; padding: 0.1rem 0.4rem; font-size: 0.72rem;
    color: var(--accent2);
  }

  /* ── Results grid ────────────────────────────────────── */
  #results {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(min(100%, 480px), 1fr));
    gap: 0.7rem;
  }

  /* ── No results ──────────────────────────────────────── */
  #no-results {
    display: none; text-align: center;
    padding: 5rem 0; color: var(--muted); font-size: 0.85rem;
  }
  #no-results .big { font-size: 2.5rem; display: block; margin-bottom: 0.8rem; opacity: 0.3; }

  /* ── Card ────────────────────────────────────────────── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px; overflow: hidden;
    transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
    animation: fadeIn 0.2s ease both;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(5px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .card:hover {
    border-color: var(--dim);
    transform: translateY(-1px);
    box-shadow: 0 4px 22px rgba(0,0,0,0.45);
  }

  .card-header {
    display: flex; align-items: center; gap: 0.55rem;
    padding: 0.65rem 0.9rem;
    border-bottom: 1px solid var(--border);
    background: rgba(255,255,255,0.016);
  }
  .card-icon {
    width: 24px; height: 24px; border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.62rem; font-weight: 700; flex-shrink: 0;
  }
  .card-title {
    font-size: 0.78rem; font-weight: 500; color: var(--bright);
    flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .card-cat {
    font-size: 0.62rem; color: var(--dim); flex-shrink: 0;
  }
  .card-tags { display: flex; gap: 0.3rem; flex-wrap: wrap; }
  .pill {
    font-size: 0.62rem; padding: 0.12rem 0.45rem;
    border-radius: 100px; border: 1px solid; opacity: 0.75;
  }

  /* ── Command block ───────────────────────────────────── */
  .cmd-block { position: relative; padding: 0.8rem 0.9rem; }
  .cmd-desc { font-size: 0.71rem; color: var(--muted); margin-bottom: 0.65rem; line-height: 1.65; }

  .cmd-line {
    background: #070a0d;
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 0.6rem 3.2rem 0.6rem 0.8rem;
    font-size: 0.77rem; color: var(--accent);
    word-break: break-all; line-height: 1.75;
    white-space: pre-wrap;
  }

  .copy-btn {
    position: absolute; top: 1.3rem; right: 1.35rem;
    background: var(--border); border: none; border-radius: 4px;
    color: var(--muted); cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.62rem; padding: 0.22rem 0.48rem;
    transition: all 0.15s; white-space: nowrap;
  }
  .copy-btn:hover  { background: var(--dim); color: var(--bright); }
  .copy-btn.copied { background: rgba(0,229,160,0.18); color: var(--accent); }

  mark { background: rgba(240,165,0,0.22); color: var(--accent2); border-radius: 2px; padding: 0 1px; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">CMD<span>Search</span></div>
    <div class="search-wrap">
      <span class="search-prefix">$</span>
      <input id="search" type="text"
        placeholder="Befehl, Tool oder Stichwort eingeben …"
        autocomplete="off" spellcheck="false" autofocus>
    </div>
    <div id="count"></div>
  </div>
  <!-- Group tabs – rendered by JS -->
  <div class="group-bar" id="groupBar"></div>
</header>

<!-- Sub-category filter – rendered by JS -->
<div class="cat-bar" id="catBar"></div>

<div class="page">
  <!-- Idle / empty start state -->
  <div id="idle">
    <div class="big-prompt">Wonach suchst du?<span>_</span></div>
    <div class="hint">
      Tippe einen Befehl oder ein Stichwort um Commands zu suchen.<br>
      Oder wähle eine Gruppe oben zum Stöbern.<br><br>
      <kbd>nmap -sV</kbd>&nbsp;&nbsp;<kbd>reverse shell</kbd>&nbsp;&nbsp;<kbd>Get-MpThreat</kbd>&nbsp;&nbsp;<kbd>privesc</kbd>
    </div>
  </div>

  <div id="results"></div>
  <div id="no-results">
    <span class="big">∅</span>
    Kein Command gefunden — versuch einen anderen Begriff.
  </div>
</div>

<!-- ── External database ── -->
<script src="commands.js"></script>

<script>
// ─── Farbzuweisung pro cat ─────────────────────────────────
const CAT_META = {
  nmap:         { short:"NM",  color:"#3b9eff" },
  netcat:       { short:"NC",  color:"#00e5a0" },
  curl:         { short:"CL",  color:"#a78bfa" },
  sqlmap:       { short:"SQL", color:"#ff4f6a" },
  linux:        { short:"LX",  color:"#f0a500" },
  python:       { short:"PY",  color:"#3b9eff" },
  gobuster:     { short:"GB",  color:"#ff4f6a" },
  ffuf:         { short:"FF",  color:"#a78bfa" },
  hydra:        { short:"HY",  color:"#ff4f6a" },
  ssh:          { short:"SSH", color:"#00e5a0" },
  openssl:      { short:"SSL", color:"#f0a500" },
  john:         { short:"JN",  color:"#ff4f6a" },
  hashcat:      { short:"HC",  color:"#a78bfa" },
  docker:       { short:"DK",  color:"#3b9eff" },
  git:          { short:"GIT", color:"#ff4f6a" },
  "defender-av":  { short:"AV",  color:"#00b4e0" },
  "defender-mde": { short:"MDE", color:"#0078d4" },
  winfirewall:  { short:"FW",  color:"#a78bfa" },
  "docker-ops": { short:"DK",  color:"#3b9eff" },
  "git-ops":    { short:"GIT", color:"#f0a500" },
};
function catMeta(cat) {
  return CAT_META[cat] || { short: cat.slice(0,3).toUpperCase(), color: "#6b7f96" };
}

// ─── State ─────────────────────────────────────────────────
let activeGroup = null;   // null = Alle
let activeCat   = null;
const searchEl  = document.getElementById('search');
const resultsEl = document.getElementById('results');
const countEl   = document.getElementById('count');
const idleEl    = document.getElementById('idle');
const noResEl   = document.getElementById('no-results');
const groupBarEl= document.getElementById('groupBar');
const catBarEl  = document.getElementById('catBar');

// ─── Distinct groups ───────────────────────────────────────
const GROUPS = ['Alle', ...new Set(DB.map(c => c.group))];

// ─── Build group tabs ──────────────────────────────────────
GROUPS.forEach(g => {
  const btn = document.createElement('button');
  btn.className = 'group-tab' + (g === 'Alle' ? ' active' : '');
  btn.textContent = g;
  btn.addEventListener('click', () => {
    activeGroup = g === 'Alle' ? null : g;
    activeCat   = null;
    document.querySelectorAll('.group-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    buildCatBar();
    render();
  });
  groupBarEl.appendChild(btn);
});

// ─── Build sub-category (cat) bar ─────────────────────────
function buildCatBar() {
  catBarEl.innerHTML = '';
  const pool = activeGroup ? DB.filter(c => c.group === activeGroup) : DB;
  const cats = [...new Set(pool.map(c => c.cat))];
  if (cats.length === 0) return;

  const allBtn = makeCatBtn('Alle', null);
  allBtn.classList.add('active');
  catBarEl.appendChild(allBtn);
  cats.forEach(cat => catBarEl.appendChild(makeCatBtn(cat, cat)));
}

function makeCatBtn(label, cat) {
  const btn = document.createElement('button');
  btn.className = 'cat-btn';
  btn.textContent = label;
  btn.addEventListener('click', () => {
    activeCat = cat;
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  });
  return btn;
}

// ─── Helpers ───────────────────────────────────────────────
function esc(t) {
  return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function hl(text, query) {
  if (!query) return esc(text);
  const rx = new RegExp(query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'), 'gi');
  return esc(text).replace(rx, m => `<mark>${m}</mark>`);
}

// ─── Card HTML ─────────────────────────────────────────────
function cardHtml(cmd, q) {
  const m = catMeta(cmd.cat);
  const tags = (cmd.tags||[]).map(t =>
    `<span class="pill" style="color:${m.color};border-color:${m.color}40">${esc(t)}</span>`
  ).join('');

  return `
  <article class="card">
    <div class="card-header">
      <div class="card-icon" style="background:${m.color}1a;color:${m.color}">${m.short}</div>
      <div class="card-title">${hl(cmd.title, q)}</div>
      <div class="card-cat">${esc(cmd.cat)}</div>
      <div class="card-tags">${tags}</div>
    </div>
    <div class="cmd-block">
      <div class="cmd-desc">${hl(cmd.desc, q)}</div>
      <div class="cmd-line">${hl(cmd.cmd, q)}<button class="copy-btn" onclick="copyCmd(this,${JSON.stringify(cmd.cmd)})">copy</button></div>
    </div>
  </article>`;
}

// ─── Render ────────────────────────────────────────────────
function render() {
  const q     = searchEl.value.trim().toLowerCase();
  const terms = q.split(/\s+/).filter(Boolean);
  const isIdle = terms.length === 0 && !activeGroup && !activeCat;

  // Show idle screen when nothing is active
  idleEl.style.display = isIdle ? 'flex' : 'none';

  if (isIdle) {
    resultsEl.innerHTML = '';
    noResEl.style.display = 'none';
    countEl.innerHTML = '';
    return;
  }

  const filtered = DB.filter(cmd => {
    if (activeGroup && cmd.group !== activeGroup) return false;
    if (activeCat   && cmd.cat   !== activeCat)   return false;
    if (!terms.length) return true;
    const hay = [cmd.group, cmd.cat, cmd.title, cmd.desc, cmd.cmd, ...(cmd.tags||[])].join(' ').toLowerCase();
    return terms.every(t => hay.includes(t));
  });

  countEl.innerHTML = `<strong>${filtered.length}</strong> command${filtered.length !== 1 ? 's' : ''}`;

  if (filtered.length === 0) {
    resultsEl.innerHTML = '';
    noResEl.style.display = 'block';
  } else {
    noResEl.style.display = 'none';
    resultsEl.innerHTML = filtered.map(cmd => cardHtml(cmd, q)).join('');
  }
}

// ─── Copy ──────────────────────────────────────────────────
function copyCmd(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'copied!'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'copy'; btn.classList.remove('copied'); }, 1500);
  });
}

// ─── Init ──────────────────────────────────────────────────
searchEl.addEventListener('input', () => { activeCat = null; buildCatBar(); render(); });
buildCatBar();
render();
</script>
</body>
</html>
