<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CMD Search</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0a0c0f;
    --surface:  #0f1318;
    --border:   #1e2530;
    --accent:   #00e5a0;
    --accent2:  #f0a500;
    --dim:      #3a4555;
    --muted:    #6b7f96;
    --text:     #c8d8e8;
    --bright:   #eaf4ff;
    --red:      #ff4f6a;
    --blue:     #3b9eff;
    --purple:   #a78bfa;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* Ambient glow */
  body::after {
    content: '';
    position: fixed;
    top: -30vh;
    left: 50%;
    transform: translateX(-50%);
    width: 80vw;
    height: 60vh;
    background: radial-gradient(ellipse, rgba(0,229,160,0.04) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* ─── Header ─── */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,12,15,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 clamp(1rem, 4vw, 3rem);
  }

  .header-inner {
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 1.5rem;
    padding: 1rem 0;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 1.4rem;
    font-weight: 800;
    color: var(--bright);
    letter-spacing: -0.02em;
    flex-shrink: 0;
    user-select: none;
  }

  .logo span { color: var(--accent); }

  /* ─── Search ─── */
  .search-wrap {
    flex: 1;
    position: relative;
    display: flex;
    align-items: center;
  }

  .search-prefix {
    position: absolute;
    left: 1rem;
    color: var(--accent);
    font-size: 1rem;
    pointer-events: none;
    user-select: none;
  }

  #search {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--bright);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.9rem;
    padding: 0.6rem 1rem 0.6rem 2.4rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    caret-color: var(--accent);
  }

  #search:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(0,229,160,0.12), 0 0 20px rgba(0,229,160,0.06);
  }

  #search::placeholder { color: var(--dim); }

  .result-count {
    flex-shrink: 0;
    font-size: 0.75rem;
    color: var(--muted);
    white-space: nowrap;
  }

  .result-count strong { color: var(--accent); }

  /* ─── Layout ─── */
  .page {
    max-width: 1100px;
    margin: 0 auto;
    padding: 1.5rem clamp(1rem, 4vw, 3rem) 4rem;
    position: relative;
    z-index: 1;
  }

  /* ─── Filter bar ─── */
  .filter-bar {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-bottom: 1.5rem;
  }

  .tag-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    padding: 0.3rem 0.7rem;
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
  }

  .tag-btn:hover { border-color: var(--dim); color: var(--text); }

  .tag-btn.active {
    background: rgba(0,229,160,0.1);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* ─── Command grid ─── */
  #results {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(min(100%, 480px), 1fr));
    gap: 0.75rem;
  }

  /* ─── Card ─── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
    animation: fadeIn 0.25s ease both;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card:hover {
    border-color: var(--dim);
    transform: translateY(-1px);
    box-shadow: 0 4px 24px rgba(0,0,0,0.4);
  }

  .card-header {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.7rem 1rem;
    border-bottom: 1px solid var(--border);
    background: rgba(255,255,255,0.018);
  }

  .card-icon {
    width: 22px;
    height: 22px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    font-weight: 700;
    flex-shrink: 0;
    letter-spacing: 0;
  }

  .card-title {
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--bright);
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .card-tags {
    display: flex;
    gap: 0.3rem;
    flex-wrap: wrap;
  }

  .pill {
    font-size: 0.65rem;
    padding: 0.15rem 0.5rem;
    border-radius: 100px;
    border: 1px solid;
    opacity: 0.8;
  }

  /* ─── Command block ─── */
  .cmd-block {
    position: relative;
    padding: 0.9rem 1rem;
  }

  .cmd-desc {
    font-size: 0.72rem;
    color: var(--muted);
    margin-bottom: 0.7rem;
    line-height: 1.6;
  }

  .cmd-line {
    background: #070a0d;
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 0.65rem 3rem 0.65rem 0.85rem;
    font-size: 0.78rem;
    color: var(--accent);
    word-break: break-all;
    line-height: 1.7;
    position: relative;
  }

  /* syntax highlights */
  .cmd-line .flag  { color: var(--accent2); }
  .cmd-line .val   { color: var(--blue); }
  .cmd-line .kw    { color: var(--purple); }

  .copy-btn {
    position: absolute;
    top: 0.5rem;
    right: 0.5rem;
    background: var(--border);
    border: none;
    border-radius: 4px;
    color: var(--muted);
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    padding: 0.25rem 0.5rem;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .copy-btn:hover  { background: var(--dim); color: var(--bright); }
  .copy-btn.copied { background: rgba(0,229,160,0.2); color: var(--accent); }

  /* ─── No results ─── */
  #no-results {
    display: none;
    text-align: center;
    padding: 5rem 0;
    color: var(--muted);
    font-size: 0.85rem;
  }

  #no-results .big { font-size: 3rem; display: block; margin-bottom: 1rem; opacity: 0.4; }

  /* ─── Highlight match ─── */
  mark {
    background: rgba(240,165,0,0.25);
    color: var(--accent2);
    border-radius: 2px;
    padding: 0 1px;
  }

  /* ─── Category colors ─── */
  [data-cat="nmap"]       .card-icon { background: rgba(59,158,255,0.15); color: #3b9eff; }
  [data-cat="netcat"]     .card-icon { background: rgba(0,229,160,0.15); color: var(--accent); }
  [data-cat="curl"]       .card-icon { background: rgba(167,139,250,0.15); color: var(--purple); }
  [data-cat="sqlmap"]     .card-icon { background: rgba(255,79,106,0.15); color: var(--red); }
  [data-cat="bash"]       .card-icon { background: rgba(240,165,0,0.15); color: var(--accent2); }
  [data-cat="python"]     .card-icon { background: rgba(59,158,255,0.15); color: #3b9eff; }
  [data-cat="gobuster"]   .card-icon { background: rgba(255,79,106,0.15); color: var(--red); }
  [data-cat="ffuf"]       .card-icon { background: rgba(167,139,250,0.15); color: var(--purple); }
  [data-cat="hydra"]      .card-icon { background: rgba(255,79,106,0.15); color: var(--red); }
  [data-cat="ssh"]        .card-icon { background: rgba(0,229,160,0.15); color: var(--accent); }
  [data-cat="openssl"]    .card-icon { background: rgba(240,165,0,0.15); color: var(--accent2); }
  [data-cat="john"]       .card-icon { background: rgba(255,79,106,0.15); color: var(--red); }
  [data-cat="hashcat"]    .card-icon { background: rgba(167,139,250,0.15); color: var(--purple); }
  [data-cat="linux"]      .card-icon { background: rgba(240,165,0,0.15); color: var(--accent2); }
  [data-cat="docker"]     .card-icon { background: rgba(59,158,255,0.15); color: #3b9eff; }
  [data-cat="git"]        .card-icon { background: rgba(255,79,106,0.15); color: var(--red); }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">CMD<span>Search</span></div>
    <div class="search-wrap">
      <span class="search-prefix">$</span>
      <input id="search" type="text" placeholder="nmap -sV ... sudo nc ... curl -X POST ..." autocomplete="off" spellcheck="false" autofocus>
    </div>
    <div class="result-count" id="count"><strong>0</strong> commands</div>
  </div>
</header>

<div class="page">
  <div class="filter-bar" id="filters"></div>
  <div id="results"></div>
  <div id="no-results">
    <span class="big">∅</span>
    Kein Command gefunden – versuch einen anderen Begriff.
  </div>
</div>

// ─────────────────────────────────────────────
//  KATEGORIEN & FARBEN
// ─────────────────────────────────────────────
const CAT_META = {
  nmap:     { short: "NM",  color: "#3b9eff" },
  netcat:   { short: "NC",  color: "#00e5a0" },
  curl:     { short: "CL",  color: "#a78bfa" },
  sqlmap:   { short: "SQL", color: "#ff4f6a" },
  bash:     { short: "SH",  color: "#f0a500" },
  python:   { short: "PY",  color: "#3b9eff" },
  gobuster: { short: "GB",  color: "#ff4f6a" },
  ffuf:     { short: "FF",  color: "#a78bfa" },
  hydra:    { short: "HY",  color: "#ff4f6a" },
  ssh:      { short: "SSH", color: "#00e5a0" },
  openssl:  { short: "SSL", color: "#f0a500" },
  john:     { short: "JN",  color: "#ff4f6a" },
  hashcat:  { short: "HC",  color: "#a78bfa" },
  linux:    { short: "LX",  color: "#f0a500" },
  docker:   { short: "DK",  color: "#3b9eff" },
  git:      { short: "GIT", color: "#ff4f6a" },
};

// ─────────────────────────────────────────────
//  UI INIT
// ─────────────────────────────────────────────
const searchEl  = document.getElementById('search');
const resultsEl = document.getElementById('results');
const countEl   = document.getElementById('count');
const noResEl   = document.getElementById('no-results');
const filtersEl = document.getElementById('filters');

let activeFilter = null;

// Build filter buttons
const cats = [...new Set(DB.map(c => c.cat))];
const allBtn = makeTagBtn('Alle', null);
allBtn.classList.add('active');
filtersEl.appendChild(allBtn);
cats.forEach(cat => filtersEl.appendChild(makeTagBtn(cat, cat)));

function makeTagBtn(label, cat) {
  const btn = document.createElement('button');
  btn.className = 'tag-btn';
  btn.textContent = label;
  btn.addEventListener('click', () => {
    activeFilter = cat;
    document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  });
  return btn;
}

function highlight(text, query) {
  if (!query) return escHtml(text);
  const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return escHtml(text).replace(new RegExp(escaped, 'gi'), m => `<mark>${m}</mark>`);
}

function escHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function pillHtml(tag, cat) {
  const meta = CAT_META[cat] || { color: '#6b7f96' };
  return `<span class="pill" style="color:${meta.color};border-color:${meta.color}40">${escHtml(tag)}</span>`;
}

function cardHtml(cmd, query) {
  const meta = CAT_META[cmd.cat] || { short: '?', color: '#6b7f96' };
  const tags = (cmd.tags || []).map(t => pillHtml(t, cmd.cat)).join('');
  const highlightedCmd = highlight(cmd.cmd, query);

  return `
  <article class="card" data-cat="${escHtml(cmd.cat)}">
    <div class="card-header">
      <div class="card-icon">${meta.short}</div>
      <div class="card-title">${highlight(cmd.title, query)}</div>
      <div class="card-tags">${tags}</div>
    </div>
    <div class="cmd-block">
      <div class="cmd-desc">${highlight(cmd.desc, query)}</div>
      <div class="cmd-line">
        ${highlightedCmd}
        <button class="copy-btn" onclick="copyCmd(this, ${JSON.stringify(cmd.cmd)})">copy</button>
      </div>
    </div>
  </article>`;
}

function render() {
  const q = searchEl.value.trim().toLowerCase();
  const terms = q.split(/\s+/).filter(Boolean);

  const filtered = DB.filter(cmd => {
    if (activeFilter && cmd.cat !== activeFilter) return false;
    if (!terms.length) return true;
    const hay = [cmd.cat, cmd.title, cmd.desc, cmd.cmd, ...(cmd.tags||[])].join(' ').toLowerCase();
    return terms.every(t => hay.includes(t));
  });

  countEl.innerHTML = `<strong>${filtered.length}</strong> command${filtered.length !== 1 ? 's' : ''}`;

  if (filtered.length === 0) {
    resultsEl.innerHTML = '';
    noResEl.style.display = 'block';
  } else {
    noResEl.style.display = 'none';
    resultsEl.innerHTML = filtered.map(cmd => cardHtml(cmd, q)).join('');
  }
}

function copyCmd(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'copy'; btn.classList.remove('copied'); }, 1500);
  });
}

searchEl.addEventListener('input', render);
render();
</script>
