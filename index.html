<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CMD Search</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #0a0c0f;
    --surface: #0f1318;
    --border:  #1e2530;
    --accent:  #00e5a0;
    --accent2: #f0a500;
    --dim:     #3a4555;
    --muted:   #6b7f96;
    --text:    #c8d8e8;
    --bright:  #eaf4ff;
    --red:     #ff4f6a;
    --blue:    #3b9eff;
    --purple:  #a78bfa;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
  }

  /* Scanlines */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px);
    pointer-events: none; z-index: 9999;
  }

  /* ── Top bar ─────────────────────────────────────────── */
  #topbar {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10,12,15,0.95);
    backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--border);
  }

  .topbar-inner {
    max-width: 720px; margin: 0 auto;
    padding: 1rem clamp(1rem, 4vw, 2rem);
  }

  /* Logo */
  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 1.1rem; font-weight: 800;
    color: var(--bright); letter-spacing: -0.02em;
    text-align: center;
    margin-bottom: 0.75rem;
    user-select: none;
  }
  .logo span { color: var(--accent); }

  /* Search input */
  .search-wrap {
    position: relative; display: flex; align-items: center;
  }
  .search-prefix {
    position: absolute; left: 1rem;
    color: var(--accent); font-size: 1rem;
    pointer-events: none; user-select: none; z-index: 1;
  }
  #search {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--bright);
    font-family: 'JetBrains Mono', monospace;
    font-size: 1rem;
    padding: 0.75rem 1rem 0.75rem 2.4rem;
    outline: none; caret-color: var(--accent);
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  #search:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,229,160,0.1), 0 0 20px rgba(0,229,160,0.06);
  }
  #search::placeholder { color: var(--dim); }

  /* ── Group tabs ──────────────────────────────────────── */
  .group-bar {
    max-width: 720px; margin: 0 auto;
    padding: 0 clamp(1rem, 4vw, 2rem);
    display: flex; gap: 0; overflow-x: auto;
    scrollbar-width: none; border-bottom: 1px solid var(--border);
  }
  .group-bar::-webkit-scrollbar { display: none; }

  .group-tab {
    background: none; border: none;
    border-bottom: 2px solid transparent;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.73rem; font-weight: 500;
    padding: 0.6rem 1rem;
    cursor: pointer; white-space: nowrap;
    transition: color 0.15s, border-color 0.15s;
    position: relative; top: 1px;
  }
  .group-tab:hover { color: var(--text); }
  .group-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* ── Cat filter ──────────────────────────────────────── */
  .cat-bar {
    max-width: 720px; margin: 0 auto;
    padding: 0.7rem clamp(1rem, 4vw, 2rem) 0;
    display: flex; gap: 0.4rem; flex-wrap: wrap;
    min-height: 2.4rem;
  }
  .cat-btn {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 4px; color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem; padding: 0.22rem 0.6rem;
    cursor: pointer; transition: all 0.15s; user-select: none;
  }
  .cat-btn:hover { border-color: var(--dim); color: var(--text); }
  .cat-btn.active { background: rgba(0,229,160,0.1); border-color: var(--accent); color: var(--accent); }

  /* ── Page ────────────────────────────────────────────── */
  .page {
    max-width: 720px; margin: 0 auto;
    padding: 1rem clamp(1rem, 4vw, 2rem) 5rem;
  }

  /* ── Count ───────────────────────────────────────────── */
  #count {
    font-size: 0.7rem; color: var(--muted);
    text-align: right; margin-bottom: 0.75rem;
  }
  #count strong { color: var(--accent); }

  /* ── Empty state ─────────────────────────────────────── */
  #empty {
    text-align: center;
    padding: 4rem 0 2rem;
    color: var(--dim); font-size: 0.8rem; line-height: 2;
  }
  #empty kbd {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 3px; padding: 0.1rem 0.45rem;
    font-size: 0.7rem; color: var(--accent2);
  }

  /* ── No results ──────────────────────────────────────── */
  #no-results {
    display: none; text-align: center;
    padding: 4rem 0; color: var(--muted); font-size: 0.85rem;
  }
  #no-results .big { font-size: 2.5rem; display: block; margin-bottom: 0.8rem; opacity: 0.3; }

  /* ── Cards ───────────────────────────────────────────── */
  #results { display: flex; flex-direction: column; gap: 0.65rem; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px; overflow: hidden;
    transition: border-color 0.2s, box-shadow 0.15s;
    animation: fadeIn 0.2s ease both;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .card:hover { border-color: var(--dim); box-shadow: 0 4px 20px rgba(0,0,0,0.4); }

  .card-header {
    display: flex; align-items: center; gap: 0.6rem;
    padding: 0.65rem 0.9rem;
    border-bottom: 1px solid var(--border);
    background: rgba(255,255,255,0.018);
  }
  .card-icon {
    width: 24px; height: 24px; border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.62rem; font-weight: 700; flex-shrink: 0;
  }
  .card-title {
    font-size: 0.78rem; font-weight: 500; color: var(--bright);
    flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .card-cat { font-size: 0.62rem; color: var(--dim); flex-shrink: 0; }
  .card-tags { display: flex; gap: 0.3rem; flex-wrap: wrap; }
  .pill {
    font-size: 0.62rem; padding: 0.12rem 0.45rem;
    border-radius: 100px; border: 1px solid; opacity: 0.75;
  }

  .cmd-block { position: relative; padding: 0.8rem 0.9rem; }
  .cmd-desc { font-size: 0.71rem; color: var(--muted); margin-bottom: 0.65rem; line-height: 1.65; }
  .cmd-line {
    background: #070a0d; border: 1px solid var(--border);
    border-radius: 5px;
    padding: 0.6rem 3.2rem 0.6rem 0.8rem;
    font-size: 0.77rem; color: var(--accent);
    word-break: break-all; line-height: 1.75; white-space: pre-wrap;
  }
  .copy-btn {
    position: absolute; top: 1.3rem; right: 1.35rem;
    background: var(--border); border: none; border-radius: 4px;
    color: var(--muted); cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.62rem; padding: 0.22rem 0.48rem;
    transition: all 0.15s; white-space: nowrap;
  }
  .copy-btn:hover  { background: var(--dim); color: var(--bright); }
  .copy-btn.copied { background: rgba(0,229,160,0.18); color: var(--accent); }

  mark { background: rgba(240,165,0,0.22); color: var(--accent2); border-radius: 2px; padding: 0 1px; }
</style>
</head>
<body>

<div id="topbar">
  <div class="topbar-inner">
    <div class="logo">CMD<span>Search</span></div>
    <div class="search-wrap">
      <span class="search-prefix">$</span>
      <input id="search" type="text"
        placeholder="Befehl, Tool oder Stichwort eingeben …"
        autocomplete="off" spellcheck="false" autofocus>
    </div>
  </div>
  <div class="group-bar" id="groupBar"></div>
</div>

<div class="cat-bar" id="catBar"></div>

<div class="page">
  <div id="count"></div>

  <div id="empty">
    Tippe einen Befehl oder ein Stichwort.<br>
    <kbd>nmap -sV</kbd>&nbsp;&nbsp;<kbd>reverse shell</kbd>&nbsp;&nbsp;<kbd>Get-MpThreat</kbd>&nbsp;&nbsp;<kbd>privesc</kbd>
  </div>

  <div id="results"></div>
  <div id="no-results">
    <span class="big">∅</span>
    Kein Command gefunden — versuch einen anderen Begriff.
  </div>
</div>

<script>
const CAT_META = {
  nmap:           { short:"NM",  color:"#3b9eff" },
  netcat:         { short:"NC",  color:"#00e5a0" },
  curl:           { short:"CL",  color:"#a78bfa" },
  sqlmap:         { short:"SQL", color:"#ff4f6a" },
  linux:          { short:"LX",  color:"#f0a500" },
  python:         { short:"PY",  color:"#3b9eff" },
  gobuster:       { short:"GB",  color:"#ff4f6a" },
  ffuf:           { short:"FF",  color:"#a78bfa" },
  hydra:          { short:"HY",  color:"#ff4f6a" },
  ssh:            { short:"SSH", color:"#00e5a0" },
  openssl:        { short:"SSL", color:"#f0a500" },
  john:           { short:"JN",  color:"#ff4f6a" },
  hashcat:        { short:"HC",  color:"#a78bfa" },
  docker:         { short:"DK",  color:"#3b9eff" },
  git:            { short:"GIT", color:"#ff4f6a" },
  "defender-av":  { short:"AV",  color:"#00b4e0" },
  "defender-mde": { short:"MDE", color:"#0078d4" },
  winfirewall:    { short:"FW",  color:"#a78bfa" },
  "docker-ops":   { short:"DK",  color:"#3b9eff" },
  "git-ops":      { short:"GIT", color:"#f0a500" },
};
function catMeta(c) { return CAT_META[c] || { short: c.slice(0,3).toUpperCase(), color:"#6b7f96" }; }

// Elements
const searchEl  = document.getElementById('search');
const resultsEl = document.getElementById('results');
const countEl   = document.getElementById('count');
const emptyEl   = document.getElementById('empty');
const noResEl   = document.getElementById('no-results');
const groupBarEl= document.getElementById('groupBar');
const catBarEl  = document.getElementById('catBar');

let activeGroup = null;
let activeCat   = null;

// Group tabs
function buildGroupTabs() {
  const groups = ['Alle', ...new Set(DB.map(c => c.group))];
  groups.forEach(g => {
    const btn = document.createElement('button');
    btn.className = 'group-tab' + (g === 'Alle' ? ' active' : '');
    btn.textContent = g;
    btn.addEventListener('click', () => {
      activeGroup = g === 'Alle' ? null : g;
      activeCat = null;
      document.querySelectorAll('.group-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      buildCatBar();
      render();
    });
    groupBarEl.appendChild(btn);
  });
}

// Cat buttons
function buildCatBar() {
  catBarEl.innerHTML = '';
  const pool = activeGroup ? DB.filter(c => c.group === activeGroup) : DB;
  const cats = [...new Set(pool.map(c => c.cat))];
  if (!cats.length) return;
  const all = makeCatBtn('Alle', null);
  all.classList.add('active');
  catBarEl.appendChild(all);
  cats.forEach(cat => catBarEl.appendChild(makeCatBtn(cat, cat)));
}
function makeCatBtn(label, cat) {
  const btn = document.createElement('button');
  btn.className = 'cat-btn';
  btn.textContent = label;
  btn.addEventListener('click', () => {
    activeCat = cat;
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  });
  return btn;
}

// Helpers
function esc(t) {
  return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function hl(text, q) {
  if (!q) return esc(text);
  const safe = esc(text);
  const lo = safe.toLowerCase();
  const ql = q.toLowerCase();
  const parts = [];
  let i = 0;
  while (i < safe.length) {
    const f = lo.indexOf(ql, i);
    if (f === -1) { parts.push(safe.slice(i)); break; }
    parts.push(safe.slice(i, f));
    parts.push('<mark>' + safe.slice(f, f + ql.length) + '</mark>');
    i = f + ql.length;
  }
  return parts.join('');
}

function cardHtml(cmd, q) {
  const m = catMeta(cmd.cat);
  const tags = (cmd.tags||[]).map(t =>
    '<span class="pill" style="color:' + m.color + ';border-color:' + m.color + '40">' + esc(t) + '</span>'
  ).join('');
  return '<article class="card">'
    + '<div class="card-header">'
    + '<div class="card-icon" style="background:' + m.color + '1a;color:' + m.color + '">' + m.short + '</div>'
    + '<div class="card-title">' + hl(cmd.title, q) + '</div>'
    + '<div class="card-cat">' + esc(cmd.cat) + '</div>'
    + '<div class="card-tags">' + tags + '</div>'
    + '</div>'
    + '<div class="cmd-block">'
    + '<div class="cmd-desc">' + hl(cmd.desc, q) + '</div>'
    + '<div class="cmd-line">' + hl(cmd.cmd, q)
    + '<button class="copy-btn" data-cmd="' + esc(cmd.cmd) + '">copy</button></div>'
    + '</div></article>';
}

function render() {
  const q = searchEl.value.trim().toLowerCase();
  const terms = q.split(/\s+/).filter(Boolean);
  const isIdle = !terms.length && !activeGroup && !activeCat;

  emptyEl.style.display   = isIdle ? 'block' : 'none';
  noResEl.style.display   = 'none';
  countEl.textContent     = '';

  if (isIdle) { resultsEl.innerHTML = ''; return; }

  const filtered = DB.filter(cmd => {
    if (activeGroup && cmd.group !== activeGroup) return false;
    if (activeCat   && cmd.cat   !== activeCat)   return false;
    if (!terms.length) return true;
    const hay = [cmd.group, cmd.cat, cmd.title, cmd.desc, cmd.cmd, ...(cmd.tags||[])].join(' ').toLowerCase();
    return terms.every(t => hay.includes(t));
  });

  countEl.innerHTML = '<strong>' + filtered.length + '</strong> command' + (filtered.length !== 1 ? 's' : '');

  if (!filtered.length) {
    resultsEl.innerHTML = '';
    noResEl.style.display = 'block';
  } else {
    resultsEl.innerHTML = filtered.map(cmd => cardHtml(cmd, q)).join('');
  }
}

// Copy
resultsEl.addEventListener('click', e => {
  const btn = e.target.closest('.copy-btn');
  if (!btn) return;
  const d = document.createElement('div');
  d.innerHTML = btn.dataset.cmd;
  const text = d.textContent;
  const done = () => {
    btn.textContent = 'copied!'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'copy'; btn.classList.remove('copied'); }, 1500);
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(done).catch(() => fallback(text, done));
  } else { fallback(text, done); }
});
function fallback(text, cb) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0;pointer-events:none';
  document.body.appendChild(ta); ta.focus(); ta.select();
  try { document.execCommand('copy'); cb(); } catch(e) {}
  document.body.removeChild(ta);
}

searchEl.addEventListener('input', render);

fetch('commands.json')
  .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
  .then(data => {
    window.DB = data;
    buildGroupTabs();
    buildCatBar();
    render();
  })
  .catch(err => {
    emptyEl.innerHTML = '<span style="color:var(--red)">\u26a0 commands.json konnte nicht geladen werden<br>'
      + '<small style="color:var(--muted)">' + err.message + '</small></span>';
  });
</script>
</body>
</html>
